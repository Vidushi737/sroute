server:
  port: ${PORT:8080}

spring:
  application:
    name: sroute-backend
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres?stringtype=unspecified}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          # In local development without Supabase keys, Spring Security JWT decoder will fallback to mock validation
          issuer-uri: ${SUPABASE_ISSUER_URI:https://mock-issuer.supabase.co/auth/v1}

# Custom Application settings
app:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
